version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Tokyo'
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 6
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      npm-major:
        applies-to: 'version-updates'
        patterns:
          - '*'
        update-types:
          - 'major'
      npm-minor-patch:
        applies-to: 'version-updates'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'Asia/Tokyo'
    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1
    open-pull-requests-limit: 3
    commit-message:
      prefix: 'chore(ci)'
      include: 'scope'
    groups:
      github-actions:
        applies-to: 'version-updates'
        patterns:
          - '*'
